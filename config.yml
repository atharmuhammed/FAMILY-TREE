backend:
  name: git-gateway
  branch: main
media_folder: "static/images"
public_folder: "images"
collections:
  - name: "family"
    label: "Family Member"
    folder: "data"
    create: true
    slug: "{{slug}}" # This creates a unique URL for each person
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image"}
      - {label: "Relation", name: "relation", widget: "select", options: ["Head", "Son", "Daughter", "Wife", "Husband", "Father", "Mother", "Brother", "Sister"]}
      - {label: "Father Name", name: "father", widget: "string", required: false}
      - {label: "Mother Name", name: "mother", widget: "string", required: false}
      - {label: "Spouse Name", name: "spouse", widget: "string", required: false}
