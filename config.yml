backend:
  name: git-gateway
  branch: main
  
# These two lines were missing and caused the error
media_folder: "static/images"
public_folder: "images"

collections:
  - name: "family"
    label: "Family Member"
    folder: "data"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Photo", name: "photo", widget: "image"}
      - {label: "Relation", name: "relation", widget: "select", options: ["Head", "Son", "Daughter", "Wife", "Husband"]}
