    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        
        /* Box styling */
        .box { 
            background: white; 
            padding: 15px; 
            border: 2px solid #3498db; 
            border-radius: 20px; 
            width: 200px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin: 10px; 
            display: inline-block; 
            vertical-align: top; 
            text-align: center;
        }

        .children-heading { text-align: center; font-size: 2.0em; margin-top: 40px; margin-bottom: 0; color: #333; }

        .top-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 0; }

        /* The vertical line bridge */
        .connector-line {
            width: 2px;
            height: 40px;
            background: #3498db;
            margin: 0 auto;
        }

        .children-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    </style>
</head>
