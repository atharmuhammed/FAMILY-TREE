<style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
    
    /* Unified style for all boxes */
    .box { 
        background: white; 
        padding: 20px; 
        border: 2px solid #3498db; 
        border-radius: 15px; 
        width: 220px; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        margin: 10px;
        display: inline-block;
        vertical-align: top;
    }
    
    h3, h4 { color: #2c3e50; margin: 5px 0; }
    
    .top-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
    
    .children-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
    
    .child-box { text-decoration: none; color: #3498db; transition: transform 0.2s; }
    .child-box:hover { transform: scale(1.05); cursor: pointer; }
</style>
