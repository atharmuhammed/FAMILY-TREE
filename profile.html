<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Family Profile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        
        /* Two-box parent layout */
        .top-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 50px; }
        .box { background: white; padding: 30px; border: 2px solid #3498db; border-radius: 15px; width: 250px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .box h3 { margin: 0 0 10px 0; color: #2c3e50; }

        /* Children grid layout */
        .children-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .child-box { 
            background: #fff; 
            padding: 20px; 
            border: 1px solid #3498db; 
            border-radius: 10px; 
            width: 180px; 
            text-decoration: none;
            transition: transform 0.2s;
        }
        .child-box:hover { transform: scale(1.05); }
        .child-box a { text-decoration: none; color: #3498db; font-weight: bold; }
    </style>
</head>
<body>
    <div id="profile-container">Loading details...</div>
    <script src="profile.js"></script>
</body>
</html>
