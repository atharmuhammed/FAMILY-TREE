<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .box { 
            background: white; padding: 20px; border: 2px solid #3498db; 
            border-radius: 15px; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin: 10px; display: inline-block; vertical-align: top; text-align: center;
        }
        /* Increased size for children boxes */
        .child-box { width: 250px; padding: 25px; }
        .child-box h4 { font-size: 1.3em; margin: 5px 0; color: #2c3e50; }
        .date-info { font-size: 0.9em; color: #444; margin-top: 10px; }
        
        .top-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .children-row { 
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 20px; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="profile-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="profile.js"></script>
</body>
</html>
