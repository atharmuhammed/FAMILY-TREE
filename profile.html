<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; }
        
        /* Box styling for everyone */
        .box { 
            background: white; 
            padding: 18px; 
            border: 2px solid #3498db; 
            border-radius: 20px; 
            width: 200px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin: 10px; 
            display: inline-block; 
            vertical-align: top; 
            text-align: center;
        }

        /* Large heading for Children */
        .children-heading { 
            text-align: center; 
            font-size: 2.0em; 
            margin-top: 40px; 
            margin-bottom: 20px;
            color: #333;
        }

        /* Layout containers */
        .top-row { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            margin-bottom: 30px; 
        }

        .children-row { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="profile-container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="profile.js"></script>
</body>
</html>
