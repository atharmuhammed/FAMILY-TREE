<!DOCTYPE html>
<html>
<head>
    <title>Family Tree</title>
</head>
<body>
    <div id="app">Loading...</div>
    <script>
        async function init() {
            try {
                // Fetch the file Decap CMS creates
                const response = await fetch('./data/family_data.json');
                const data = await response.json();
                document.getElementById('app').innerHTML = "<h1>Data Loaded!</h1>";
                console.log(data);
            } catch (err) {
                document.getElementById('app').innerHTML = "Still loading or data file not found at /data/family_data.json";
            }
        }
        init();
    </script>
</body>
</html>
