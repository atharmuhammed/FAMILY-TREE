<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Family Tree</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        h1 { color: #333; }
        .tree-container { margin-top: 30px; }
        
        /* Updated member style to look and act like a button */
        .member { 
            border: 2px solid #333; 
            padding: 15px 25px; 
            display: inline-block; 
            margin: 10px; 
            border-radius: 8px; 
            background: white; 
            text-decoration: none; 
            color: #333; 
            font-weight: bold;
            transition: background 0.3s;
        }
        
        /* Adds a nice color change when you move your mouse over the button */
        .member:hover { background: #e0e0e0; }
        
        .admin-link { margin-top: 50px; display: block; color: #666; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Welcome to Our Family Tree</h1>
    
    <div class="tree-container">
        <a href="grandparent.html" class="member">Grandparent</a>
        <a href="parent.html" class="member">Parent</a>
        <a href="you.html" class="member">You</a>
    </div>

    <a href="admin/admin.html" class="admin-link">Access Admin Dashboard</a>

</body>
</html>
