<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER ABDUL GAFFAR SULLIA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f4f4f9; }
        .header-section { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 40px; }
        
        /* You can change width/height here */
        .hero-img { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 4px solid #3498db; }
        
        .box { 
            background: white; padding: 20px; border: 2px solid #3498db; 
            border-radius: 15px; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin: 10px; display: inline-block; vertical-align: top; text-align: center;
        }
        .tree-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .box a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="abdul_gaffar.jpg" alt="Master Abdul Gaffar Sullia" class="hero-img">
        <h1 style="text-align: center;">MASTER ABDUL GAFFAR SULLIA</h1>
        <img src="books.jpg" alt="Books Written" class="hero-img">
    </div>

    <div id="tree-container" class="tree-container"></div>
    <script src="script.js"></script>
</body>
</html>
