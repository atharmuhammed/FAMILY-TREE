<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Family Tree</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; text-align: center; }
        .tree { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .member-card { border: 2px solid #ddd; padding: 15px; border-radius: 10px; width: 250px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #3498db; }
        h3 { margin: 10px 0; color: #2c3e50; }
        p { margin: 5px 0; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <h1>Our Family Tree</h1>
    <div id="tree" class="tree"></div>

    <script>
        fetch('family_data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('tree');
                data.forEach(m => {
                    container.innerHTML += `
                        <div class="member-card">
                            <img src="${m.photo}" alt="${m.name}">
                            <h3>${m.name}</h3>
                            <p><strong>Relation:</strong> ${m.relation}</p>
                            <p><strong>Born:</strong> ${m.dob} ${m.dod ? '| Died: ' + m.dod : ''}</p>
                            <p><strong>Spouse(s):</strong> ${m.spouse.length > 0 ? m.spouse.join(', ') : 'None'}</p>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
