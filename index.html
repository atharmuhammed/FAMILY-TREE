<!DOCTYPE html>
<html>
<head>
    <title>Family Tree</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .member-card { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; }
    </style>
</head>
<body>
    <h1>Our Family Tree</h1>
    <div id="tree-container"></div>

    <script>
        async function loadFamilyData() {
            const container = document.getElementById('tree-container');
            try {
                // Fetching the index file that Decap CMS often creates
                const response = await fetch('data/family.json'); 
                if (!response.ok) throw new Error("Could not load data.");
                const data = await response.json();
                
                container.innerHTML = ""; // Clear loading message
                data.forEach(member => {
                    container.innerHTML += `
                        <div class="member-card">
                            <h3>${member.name}</h3>
                            <p>${member.relation}</p>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = "<p>Data not found yet. Please ensure you have added a member in /admin and clicked Publish.</p>";
                console.error("Fetch error:", error);
            }
        }
        loadFamilyData();
    </script>
</body>
</html>
