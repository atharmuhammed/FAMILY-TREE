<!DOCTYPE html>

    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f4f4f9;

        .gallery-container { 
            display: flex; align-items: center; justify-content: center;

        .book-img { 
            width: 120px; height: 160px; object-fit: cover; 
            border-radius: 5px; border: 2px solid #3498db;

            border-radius: 15px; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);

        .site-footer {
            margin-top: auto; text-align: right; padding: 20px;

    <div class="gallery-container">

        </div>
    </div>

        <h2 style="text-align: center;">BIOGRAPHY OF ABDUL GAFFAR SULLIA (1922- 1998) </h2>
        <p>Born in Mangalore in 1922, Abdul Gaffar Sullia was a distinguished educator, religious scholar, and polyglot...</p>
