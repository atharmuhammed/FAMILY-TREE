<!DOCTYPE html>
<html>
<head>
    <title>Family Tree</title>
    <style>
        .profile { border: 2px solid #333; padding: 20px; text-align: center; max-width: 400px; margin: auto; }
        .relatives { margin-top: 20px; display: flex; justify-content: space-around; }
    </style>
</head>
<body>
    <div id="app">Loading Profile...</div>

    <script>
        async function loadProfile() {
            // Get the name from the URL (e.g., index.html?name=Abdul)
            const urlParams = new URLSearchParams(window.location.search);
            const personName = urlParams.get('name');
            const app = document.getElementById('app');

            // Fetch the JSON list of your family
            const response = await fetch('data/family.json'); 
            const data = await response.json();
            
            // Find the person
            const person = data.find(p => p.name === personName);

            if (!person) {
                app.innerHTML = "<h1>Family Members</h1><ul>" + 
                    data.map(p => `<li><a href="?name=${p.name}">${p.name}</a></li>`).join('') + "</ul>";
                return;
            }

            // Draw the profile
            app.innerHTML = `
                <div class="profile">
                    <img src="${person.photo}" width="200"><br>
                    <h1>${person.name}</h1>
                    <p>Relation: ${person.relation}</p>
                    <p>Spouse: ${person.spouse || 'None'}</p>
                    <div class="relatives">
                        <p>Father: ${person.father || 'N/A'}</p>
                        <p>Mother: ${person.mother || 'N/A'}</p>
                    </div>
                </div>
            `;
        }
        loadProfile();
    </script>
</body>
</html>
